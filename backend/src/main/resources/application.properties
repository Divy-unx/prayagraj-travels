server.port=${PORT}
server.address=0.0.0.0

spring.application.name=prayagraj-travels

# ── Security ────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:prayagraj-travels-dev-secret-change-me-please}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:10080}
app.admin.emails=${ADMIN_EMAILS:admin@prayagraj-travels.com}

# ── CORS Configuration ───────────────────────────────────────────────────────
# IMPORTANT: Set this environment variable on your deployment platform (Render, etc.)
# Format: comma-separated origins without trailing slash
#   ALLOWED_ORIGINS=http://localhost:3000,https://prayagraj-travels.vercel.app
# If not set, defaults to localhost:3000 and localhost:5173 for development
# DON'T use * in production - specify exact origins

# ── MySQL ────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP ─────────────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=PrayagrajHikariPool

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# ── Scheduling ───────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=4

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.travels=DEBUG
logging.level.org.springframework.jdbc=DEBUG

# ── Schema init ───────────────────────────────────────────────────────────────
# always = run schema.sql on every startup (safe because it uses CREATE IF NOT EXISTS + INSERT IGNORE)
spring.sql.init.mode=never