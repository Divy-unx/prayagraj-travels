server.port=${PORT:8081}
server.address=0.0.0.0

spring.application.name=prayagraj-travels

# ── Security ─────────────────────────────────────────────────────────────────
# ADMIN_EMAILS: comma-separated list of emails that receive ADMIN role on registration
app.admin.emails=${ADMIN_EMAILS:admin@prayagraj-travels.com}


# ── MySQL ────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP ─────────────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=PrayagrajHikariPool

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# ── Scheduling ───────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=4

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.travels=DEBUG
logging.level.org.springframework.jdbc=DEBUG

# ── Schema init ───────────────────────────────────────────────────────────────
# always = run schema.sql on every startup (idempotent: CREATE IF NOT EXISTS + INSERT IGNORE)
spring.sql.init.mode=always

# ── Mail ─────────────────────────────────────────────────────────────────────
# MAIL_USERNAME and MAIL_PASSWORD must be set in env — left blank here intentionally
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── App URLs ─────────────────────────────────────────────────────────────────
# Used in email templates and CORS. Must be set correctly for production.
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.base-url=${APP_BASE_URL:http://localhost:8081}

# ── Google OAuth ─────────────────────────────────────────────────────────────
# Leave blank to disable Google Sign-In
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.oauth-tokeninfo-url=${GOOGLE_OAUTH_TOKENINFO_URL:https://oauth2.googleapis.com/tokeninfo}

# ── JWT ──────────────────────────────────────────────────────────────────────
# JWT_SECRET: REQUIRED — must be at least 32 random characters in production.
# Generate with: openssl rand -hex 32
# No fallback intentionally: missing secret = fast startup failure instead of silent insecurity.
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiry-minutes=${JWT_ACCESS_EXPIRY_MINUTES:15}
app.jwt.refresh-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:7}